apiVersion: v1
kind: Service
metadata:
  name: fleet-server-lb
  namespace: logging
  annotations:
    # Replace fleet-server.<your-domain> with your actual domain, e.g. fleet-server.example.com
    # Remove this annotation if you don't need a DNS record via external-dns
    external-dns.alpha.kubernetes.io/hostname: fleet-server.<your-domain>
spec:
  type: LoadBalancer
  selector:
    agent.k8s.elastic.co/name: fleet-server
  ports:
  - name: https
    port: 8220
    targetPort: 8220
    protocol: TCP
