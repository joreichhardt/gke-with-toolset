# gitea-configs chart defaults — overridden by ArgoCD parameters
domain: ""
project_id: ""

# Gitea application chart values (used via $values reference in gitea ArgoCD app)
gitea:
  config:
    APP_NAME: "Gitea: Git with a cup of tea"
    database:
      DB_TYPE: sqlite3
  admin:
    username: "gitea_admin"
    existingSecret: "gitea-admin-secret"
  actions:
    ENABLED: true
    server:
      DOMAIN: ""  # overridden by ArgoCD helm.parameters
      ROOT_URL: ""  # overridden by ArgoCD helm.parameters
  service:
    http:
      type: ClusterIP
      port: 3000

postgresql:
  enabled: false
redis-cluster:
  enabled: false
postgresql-ha:
  enabled: false
memcached:
  enabled: false
