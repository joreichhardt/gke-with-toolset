apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: default
  sources:
  - chart: cert-manager
    repoURL: https://charts.jetstack.io
    targetRevision: v1.13.1
    helm:
      valueFiles:
      - $values/platform/cert-manager/values.yaml
      parameters:
      - name: serviceAccount.annotations.iam\.gke\.io/gcp-service-account
        value: "cert-manager-gsa@{{ .Values.project_id }}.iam.gserviceaccount.com"
  - repoURL: https://github.com/joreichhardt/gke-with-toolset.git
    targetRevision: HEAD
    ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-configs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/joreichhardt/gke-with-toolset.git
    targetRevision: HEAD
    path: platform/cert-manager
    helm:
      parameters:
      - name: email
        value: {{ .Values.email | quote }}
      - name: project_id
        value: {{ .Values.project_id | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
spec:
  project: default
  sources:
  - chart: external-dns
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    targetRevision: 1.13.1
    helm:
      valueFiles:
      - $values/platform/external-dns/values.yaml
      parameters:
      - name: domainFilters[0]
        value: {{ .Values.domain | quote }}
      - name: google.project
        value: {{ .Values.project_id | quote }}
      - name: serviceAccount.annotations.iam\.gke\.io/gcp-service-account
        value: "external-dns-gsa@{{ .Values.project_id }}.iam.gserviceaccount.com"
  - repoURL: https://github.com/joreichhardt/gke-with-toolset.git
    targetRevision: HEAD
    ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
spec:
  project: default
  source:
    chart: external-secrets
    repoURL: https://charts.external-secrets.io
    targetRevision: 0.9.9
    helm:
      parameters:
      - name: serviceAccount.annotations.iam\.gke\.io/gcp-service-account
        value: "eso-gsa@{{ .Values.project_id }}.iam.gserviceaccount.com"
      - name: serviceAccount.name
        value: "external-secrets-sa"
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-configs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/joreichhardt/gke-with-toolset.git
    targetRevision: HEAD
    path: platform/external-secrets
    helm:
      parameters:
      - name: project_id
        value: {{ .Values.project_id | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-configs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/joreichhardt/gke-with-toolset.git
    targetRevision: HEAD
    path: platform/gateway
    helm:
      parameters:
      - name: domain
        value: {{ .Values.domain | quote }}
      - name: project_id
        value: {{ .Values.project_id | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
