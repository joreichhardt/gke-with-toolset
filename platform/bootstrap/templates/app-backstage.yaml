apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/joreichhardt/gke-with-toolset.git
    targetRevision: HEAD
    path: platform/backstage
    helm:
      valueFiles:
      - values.yaml
      parameters:
      - name: postgresql.image.tag
        value: "15.5.0-debian-11-r0"
      - name: postgresql.image.repository
        value: "docker.io/bitnami/postgresql"
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
