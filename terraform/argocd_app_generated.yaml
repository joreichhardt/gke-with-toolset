apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: txt2md-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/joreichhardt/txt2md.git
    targetRevision: HEAD
    path: k8s # Hier liegen die Manifeste im txt2md Repo
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true

