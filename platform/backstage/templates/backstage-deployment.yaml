apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      containers:
      - name: backstage
        image: ghcr.io/backstage/backstage:latest
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: backstage-app-secret
              key: POSTGRES_PASSWORD
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: backstage-app-secret
              key: GITHUB_TOKEN
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: backstage-app-secret
              key: GITHUB_CLIENT_ID
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: backstage-app-secret
              key: GITHUB_CLIENT_SECRET
        ports:
        - containerPort: 7007
          name: http
        volumeMounts:
        - name: config
          mountPath: /app/app-config.production.yaml
          subPath: app-config.production.yaml
        - name: config
          mountPath: /app/local-catalog-info.yaml
          subPath: local-catalog-info.yaml
      volumes:
      - name: config
        configMap:
          name: backstage-config
---
apiVersion: v1
kind: Service
metadata:
  name: backstage
  namespace: backstage
spec:
  ports:
  - port: 7007
    targetPort: http
  selector:
    app: backstage
