backstage:
  image:
    repository: backstage/backstage
    tag: latest
  service:
    type: ClusterIP
    port: 7007
  # Inject secrets as environment variables
  extraEnvVarsSecrets:
    - backstage-app-secret
  appConfig:
    app:
      title: "Hannes Albeiro Dev Portal"
      baseUrl: "https://backstage.hannesalbeiro.com"
    backend:
      baseUrl: "https://backstage.hannesalbeiro.com"
      database:
        client: pg
        connection:
          host: backstage-postgresql
          port: 5432
          user: postgres
          password: ${POSTGRES_PASSWORD}

postgresql:
  enabled: true
  image:
    tag: latest
  auth:
    database: backstage_plugin_catalog
    existingSecret: "backstage-db-secret"
    secretKeys:
      adminPasswordKey: "postgres-password"
  primary:
    persistence:
      enabled: true
      size: 8Gi
