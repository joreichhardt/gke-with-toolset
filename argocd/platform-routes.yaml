# Route for Argo CD
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
spec:
  parentRefs:
  - name: main-gateway
    namespace: default
  hostnames:
  - "argocd.${DOMAIN_NAME}"
  rules:
  - backendRefs:
    - name: argocd-server
      port: 80
---
# Route for Grafana
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: monitoring
spec:
  parentRefs:
  - name: main-gateway
    namespace: default
  hostnames:
  - "grafana.${DOMAIN_NAME}"
  rules:
  - backendRefs:
    - name: monitoring-grafana
      port: 80
---
# Route for Prometheus
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: prometheus-route
  namespace: monitoring
spec:
  parentRefs:
  - name: main-gateway
    namespace: default
  hostnames:
  - "prometheus.${DOMAIN_NAME}"
  rules:
  - backendRefs:
    - name: monitoring-kube-prometheus-prometheus
      port: 9090
