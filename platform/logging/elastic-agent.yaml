apiVersion: v1
kind: ServiceAccount
metadata:
  name: elastic-agent
  namespace: logging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: elastic-agent
rules:
- apiGroups: [""]
  resources:
  - pods
  - nodes
  - nodes/stats
  - nodes/metrics
  - namespaces
  - events
  - services
  - configmaps
  - persistentvolumes
  - persistentvolumeclaims
  - resourcequotas
  verbs: ["get", "watch", "list"]
- apiGroups: ["extensions"]
  resources: ["replicasets"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["apps"]
  resources: ["statefulsets", "deployments", "replicasets", "daemonsets"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "create", "update"]
- nonResourceURLs: ["/metrics"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: elastic-agent
subjects:
- kind: ServiceAccount
  name: elastic-agent
  namespace: logging
roleRef:
  kind: ClusterRole
  name: elastic-agent
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: agent.k8s.elastic.co/v1alpha1
kind: Agent
metadata:
  name: elastic-agent
  namespace: logging
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  version: 8.11.0
  kibanaRef:
    name: kibana
  fleetServerRef:
    name: fleet-server
  mode: fleet
  daemonSet:
    podTemplate:
      spec:
        serviceAccountName: elastic-agent
        # ECK Elastic Agent DaemonSet requires root for host filesystem access
        securityContext:
          runAsUser: 0
        volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: etc-full
          hostPath:
            path: /etc
        - name: var-log
          hostPath:
            path: /var/log
        - name: var-lib
          hostPath:
            path: /var/lib
        - name: run-elastic
          hostPath:
            path: /run/elastic
        containers:
        - name: agent
          resources:
            requests:
              memory: 300Mi
              cpu: 100m
            limits:
              memory: 700Mi
              cpu: 500m
          env:
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          volumeMounts:
          - name: proc
            mountPath: /hostfs/proc
            readOnly: true
          - name: sys
            mountPath: /hostfs/sys
            readOnly: true
          - name: etc-full
            mountPath: /hostfs/etc
            readOnly: true
          - name: var-log
            mountPath: /hostfs/var/log
            readOnly: true
          - name: var-lib
            mountPath: /hostfs/var/lib
            readOnly: true
          - name: run-elastic
            mountPath: /run/elastic
