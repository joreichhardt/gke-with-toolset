apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: main-gateway
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    networking.gke.io/managed-certificates: "true"
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
  - name: https
    protocol: HTTPS
    port: 443
    hostname: "*.${DOMAIN_NAME}"
    tls:
      mode: Terminate
      certificateRefs:
      - name: main-cert
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: txt2md-route
  namespace: default
spec:
  parentRefs:
  - name: main-gateway
  hostnames:
  - "txt2md.${DOMAIN_NAME}"
  rules:
  - backendRefs:
    - name: txt2md
      port: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: txt2md
  labels:
    app: txt2md
spec:
  replicas: 2
  selector:
    matchLabels:
      app: txt2md
  template:
    metadata:
      labels:
        app: txt2md
    spec:
      containers:
      - name: txt2md
        image: europe-west3-docker.pkg.dev/${PROJECT_ID}/txt2md-repo/txt2md:latest
        ports:
        - containerPort: 5000
        env:
        - name: AI_API_KEY
          valueFrom:
            secretKeyRef:
              name: txt2md-secrets
              key: ai-api-key
        - name: FLASK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: txt2md-secrets
              key: flask-secret-key
---
apiVersion: v1
kind: Service
metadata:
  name: txt2md
spec:
  selector:
    app: txt2md
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
