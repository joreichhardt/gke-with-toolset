apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gemini-api-key
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-store
  target:
    name: gemini-api-key # Name of the K8s secret to be created
    creationPolicy: Owner
  data:
  - secretKey: api-key # Key within the K8s secret
    remoteRef:
      key: gemini-api-key # Key name in GCP Secret Manager
