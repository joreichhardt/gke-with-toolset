apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
spec:
  parentRefs:
  - name: external-http
    namespace: kube-system
    sectionName: https
  hostnames:
  - "argocd.{{ .Values.domain }}"
  rules:
  - backendRefs:
    - name: argocd-server
      port: 80
---
