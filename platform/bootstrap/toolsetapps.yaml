apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: default
  source:
    chart: cert-manager
    repoURL: https://charts.jetstack.io
    targetRevision: v1.13.1
    helm:
      parameters:
      - name: installCRDs
        value: "true"
      - name: serviceAccount.annotations.iam\.gke\.io/gcp-service-account
        value: "cert-manager-gsa@project-84ddd43d-e408-4cb9-8cb.iam.gserviceaccount.com"
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
spec:
  project: default
  source:
    chart: external-dns
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    targetRevision: 1.13.1
    helm:
      parameters:
      - name: provider
        value: google
      - name: google.project
        value: project-84ddd43d-e408-4cb9-8cb
      - name: domainFilters[0]
        value: hannesalbeiro.com
      - name: sources
        value: "{service,ingress,gateway-httproute}"
      - name: serviceAccount.annotations.iam\.gke\.io/gcp-service-account
        value: "external-dns-gsa@project-84ddd43d-e408-4cb9-8cb.iam.gserviceaccount.com"
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
spec:
  project: default
  source:
    chart: external-secrets
    repoURL: https://charts.external-secrets.io
    targetRevision: 0.9.9
    helm:
      parameters:
      - name: serviceAccount.annotations.iam\.gke\.io/gcp-service-account
        value: "eso-gsa@project-84ddd43d-e408-4cb9-8cb.iam.gserviceaccount.com"
      - name: serviceAccount.name
        value: "external-secrets-sa"
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 51.2.0
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: txt2md-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/joreichhardt/txt2md.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
