# Route für Argo CD
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
spec:
  parentRefs:
  - name: main-gateway
    namespace: default
  hostnames:
  - "argocd.hannesalbeiro.com"
  rules:
  - backendRefs:
    - name: argocd-server
      port: 80
---
# Route für Grafana
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: monitoring
spec:
  parentRefs:
  - name: main-gateway
    namespace: default
  hostnames:
  - "grafana.hannesalbeiro.com"
  rules:
  - backendRefs:
    - name: monitoring-grafana
      port: 80
---
# Route für Prometheus
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: prometheus-route
  namespace: monitoring
spec:
  parentRefs:
  - name: main-gateway
    namespace: default
  hostnames:
  - "prometheus.hannesalbeiro.com"
  rules:
  - backendRefs:
    - name: monitoring-kube-prometheus-prometheus
      port: 9090
