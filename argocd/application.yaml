apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: txt2md-platform-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/joreichhardt/gke-with-toolset.git
    targetRevision: HEAD
    path: argocd/app # Hier liegen deine Manifeste für txt2md
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
