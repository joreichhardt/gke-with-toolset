apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitea-admin-password
  namespace: gitea-ci
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-store
  target:
    name: gitea-admin-secret
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: gitea-admin-password
  - secretKey: username
    remoteRef:
      key: gitea-admin-username
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitea-runner-token
  namespace: gitea-ci
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-store
  target:
    name: gitea-runner-secret
    creationPolicy: Owner
  data:
  - secretKey: token
    remoteRef:
      key: gitea-runner-token
